# moto — 3proxy config
# Exposes SOCKS5 on :1080 and HTTP on :8118, both forwarding through
# the upstream residential proxy specified by $PROXY_URL.
#
# Agent containers set HTTP_PROXY=http://moto-proxy:8118 (or SOCKS) and all
# outbound traffic is rewritten through the residential endpoint.
#
# PROXY_URL format accepted:
#   http://USER:PASS@host:port
#   https://USER:PASS@host:port  (treated as http)
#   socks5://USER:PASS@host:port
#
# The entrypoint script will substitute ${PROXY_URL} at container start.

nserver 1.1.1.1
nserver 8.8.8.8
nscache 65536
timeouts 1 5 30 60 180 1800 15 60

# Log minimal info; rotate daily.
log /var/log/3proxy/3proxy.log D
logformat "L%Y-%m-%d %H:%M:%S %p %E %U %C:%c %R:%r %O %I %h %T"
rotate 7

# Upstream parent — substituted by entrypoint.
# ${UPSTREAM_LINE}

auth none
allow * * * *

# HTTP/HTTPS forward proxy on :8118.
proxy -p8118 -a -n

# SOCKS5 on :1080.
socks -p1080 -a

flush
