set -g mouse off
set -g history-limit 50000
setw -g mode-keys vi

# Window/pane titles (compatible with iTerm2 control mode)
set -g set-titles on
set -g set-titles-string "#S"
set-option -g automatic-rename on
set-option -g automatic-rename-format "#{session_name}"

# Status bar
set -g status on
set -g status-position bottom
set -g status-style "bg=#1a1a1a,fg=#888888"
set -g status-left "#[fg=cyan,bold] #S "
set -g status-left-length 40
set -g status-right ""

# Default shell
set -g default-shell /bin/bash

# Open Claude in every new tmux window automatically.
# Remove or change this if you don't want Claude as the default command.
set -g default-command claude

# When a new window is created, start Claude
set-hook -g after-new-window "send-keys claude Enter"
